services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-golf}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - akke

  juux:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juux
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      GOLF_DB_HOST: mysql
      GOLF_DB_PORT: 3306
      GOLF_DB_USER: root
      GOLF_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      GOLF_DB_NAME: ${MYSQL_DATABASE:-golf}
      TZ: ${TZ:-Asia/Seoul}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - akke

volumes:
  mysql_data:

networks:
  akke:
    external: true
